name: Build and publish to cache
on:
  push:
    branches: [main]
  pull_request:

jobs:
  Atelier:
    permissions:
      contents: read
      # So skipped-attribute checks can be posted.
      checks: write

    uses: JuneStepp/atelier/.github/workflows/discover.yaml@bb4408c736e9971c4bbdb7c9a9c31b2e739a6542
    with:
      repository: JuneStepp/atelier
      ref: bb4408c736e9971c4bbdb7c9a9c31b2e739a6542

    secrets:
       CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
       CACHIX_SIGNING_KEY: ${{ secrets.CACHIX_SIGNING_KEY }}
